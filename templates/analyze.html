<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyze Website</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body>
    <div class="container py-4">
        <div class="form-shell">
            <div class="row g-4 align-items-center">
                <div class="col-lg-7">
                    <div class="badge-pill">🔎 URL inspection</div>
                    <h1 class="hero-title">Analyze a website with confidence.</h1>
                    <p class="hero-copy">Enter a URL to inspect it for phishing patterns, suspicious metadata, and risk signals.</p>
                </div>
                <div class="col-lg-5">
                    <form action="/analyze" method="post" id="analysisForm">
                        <div class="form-floating-label mb-3">
                            <span class="icon">🔗</span>
                            <input type="url" id="website_url" name="website_url" placeholder="https://example.com" required>
                        </div>
                        <div class="hero-actions">
                            <button type="submit" class="btn btn-custom btn-primary-custom">Analyze Now</button>
                            <a href="/" class="btn btn-custom btn-secondary-custom">Back Home</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('analysisForm');
        const input = document.getElementById('website_url');
        if (form && input) {
            form.addEventListener('submit', function () {
                input.style.borderColor = '#22d3ee';
            });
        }
    </script>
</body>
</html>
